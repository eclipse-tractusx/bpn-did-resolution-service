---
name: "Publish Docker Image"
description: "Build and publish a Docker Image to DockerHub"
inputs:
  rootDir:
    required: true
    description: "The directory where the Dockerfile and notice.md file are located"
  namespace:
    required: false
    default: "tractusx"
    description: "The Docker image namespace"
  imagename:
    required: true
    description: "the name of the image"
  docker_user:
    required: false
    description: "DockerHub user name. No push is done if omitted"
  docker_token:
    required: false
    description: "DockerHub Token. No push is done if omitted"
  docker_tag:
    required: false
    description: 'additional docker tags'
  do_push:
    required: false
    default: 'false'
    description: 'whether or not to actually push the image'
runs:
  using: "composite"
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    #####################
    # Login to DockerHub
    #####################
    - name: DockerHub login
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        username: ${{ inputs.docker_user }}
        password: ${{ inputs.docker_token }}

    #####################
    # Build JAR file
    #####################
    - uses: ./.github/actions/setup-java
    - name: Build executable
      shell: bash
      env:
        ROOT_DIR: ${{ inputs.rootDir }}
        IMAGE_NAME: ${{ inputs.imagename }}
      run: |-
        ./gradlew -p "$ROOT_DIR" shadowJar

    ###############################
    # Set metadata of docker image
    ###############################
    # Create SemVer or ref tags dependent of trigger event
    - name: Docker meta
      id: meta
      uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
      with:
        images: |
          ${{ inputs.namespace }}/${{ inputs.imagename }}
        tags: |
          type=semver,pattern={{version}},value=${{ inputs.docker_tag }}
          type=semver,pattern={{major}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{raw}}
          type=match,pattern=\d.\d.\d
          type=raw,value=latest,enable={{is_default_branch}}
          type=sha

    ###############################
    # Build and push the image
    ###############################
    - name: Build and push
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      env:
        ROOT_DIR: ${{ inputs.rootDir }}
        IMAGE_NAME: ${{ inputs.imagename }}
      with:
        context: .
        file: ${{ env.ROOT_DIR }}/Dockerfile
        build-args: |
          JAR=${{ env.ROOT_DIR }}/${{ env.IMAGE_NAME }}/build/libs/${{ env.IMAGE_NAME }}.jar
          OTEL_JAR=${{ env.ROOT_DIR }}/${{ env.IMAGE_NAME }}/opentelemetry-javaagent.jar
        push: ${{ inputs.do_push == 'true' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    ###############################
    # Update the description
    # https://github.com/peter-evans/dockerhub-description
    ###############################
    - name: Update Docker Hub description
      uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
      with:
        readme-filepath: ${{ inputs.rootDir }}/notice.md
        username: ${{ inputs.docker_user }}
        password: ${{ inputs.docker_token }}
        repository: ${{ inputs.namespace }}/${{ inputs.imagename }}
