---
version: 2
updates:
  # Gradle
  -
    package-ecosystem: "gradle"
    target-branch: main
    directory: /
    labels:
      - "dependabot"
      - "dependencies"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 50
    cooldown:
      default-days: 7
    groups:
      edc:
        comment: "All Eclipse EDC artifacts share a single version"
        patterns:
          - "org.eclipse.edc*"
      flyway:
        comment: "Flyway core and database modules are released together"
        patterns:
          - "org.flywaydb*"
      swagger:
        comment: "Swagger annotations and Gradle plugin share the same version"
        patterns:
          - "io.swagger.core.v3*"

  # Github Actions
  -
    package-ecosystem: "github-actions"
    target-branch: main
    directories:
      - "/"
      - "/.github/actions/*"
    labels:
      - "dependabot"
      - "github-actions"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 50
    cooldown:
      default-days: 7
    groups:
      github-actions:
        comment: "Group all GitHub Actions updates to reduce PR noise"
        patterns:
          - "*"

  # Docker
  -
    package-ecosystem: "docker"
    target-branch: main
    directories:
      - "runtimes/bdrs-server/src/main/docker"
      - "runtimes/bdrs-server-memory/src/main/docker"
      - "extensions/store/sql/did-entry-store-sql/src/test/resources"
    labels:
      - "dependabot"
      - "docker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 50
    cooldown:
      default-days: 7
