---
name: "Release"

on:
  workflow_dispatch:
    inputs:
      latest:
        description: "Latest release"
        required: true
        type: boolean
        default: false
      previous_tag:
        description: "Generate release notes starting from tag"
        type: string
        required: true
        default: ""

permissions:
  contents: read

jobs:
  run-all-tests:
    name: "Run All Tests"
    permissions:
      contents: write
    uses: ./.github/workflows/run-all-tests.yml

  validation:
    name: "Workflow Validation"
    needs: [ run-all-tests ]
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.release-version.outputs.release_version }}
      update_main_branch_version: ${{ steps.update-main.outputs.update_main_branch_version }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Output release version
        id: release-version
        run: |
          VERSION=$(grep "version" gradle.properties  | awk -F= '{print $2}')
          echo "release_version=$VERSION" >> $GITHUB_OUTPUT
      - name: Output update main branch version
        id: update-main
        env:
          RELEASE_VERSION: ${{ steps.release-version.outputs.RELEASE_VERSION }}
        run: |
          IFS=.- read -r MAJOR MINOR PATCH SNAPSHOT<<<"$RELEASE_VERSION"
          if [[ $PATCH == '0' && -z $SNAPSHOT ]]; 
          then
            echo "update_main_branch_version=true" >> $GITHUB_OUTPUT
          else 
            echo "update_main_branch_version=false" >> $GITHUB_OUTPUT
          fi
      - name: Validations
        env:
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          RELEASE_VERSION: ${{ steps.release-version.outputs.RELEASE_VERSION }}
        run: |
          if [[ "$REPOSITORY" != "eclipse-tractusx/tractusx-edc" ]]; then
            echo "This workflow can only be run on the eclipse-tractusx/tractusx-edc repository."
            exit 1
          fi

          if [[ ! "$REF_NAME" =~ ^release/ ]]; then
            echo "This workflow can only be run on the branches starting with release/."
            exit 1
          fi

          if [[ "$RELEASE_VERSION" =~ SNAPSHOT ]]; then
            echo "This workflow can not be executed for SNAPSHOT versions."
            exit 1
          fi
      - name: Validate previous_tag exists
        env:
          PREVIOUS_TAG: ${{ inputs.previous_tag }}
        run: |
          git show-ref --tags --verify --quiet "refs/tags/$PREVIOUS_TAG" \
            || (echo "Tag '$PREVIOUS_TAG' not found." && exit 1)
  

  # Release: Maven Artifacts
  maven-release:
    name: Publish extension's release version to maven repository
    needs: [ validation ]
    permissions:
      contents: read
    if: needs.validation.outputs.release_version
    uses: ./.github/workflows/trigger-maven-publish.yaml
    secrets:
      ORG_GPG_PRIVATE_KEY: ${{ secrets.ORG_GPG_PRIVATE_KEY }}
      ORG_GPG_PASSPHRASE: ${{ secrets.ORG_GPG_PASSPHRASE }}
      CENTRAL_SONATYPE_TOKEN_USERNAME: ${{ secrets.CENTRAL_SONATYPE_TOKEN_USERNAME }}
      CENTRAL_SONATYPE_TOKEN_PASSWORD: ${{ secrets.CENTRAL_SONATYPE_TOKEN_PASSWORD }}
    with:
      version: ${{ needs.validation.outputs.release_version }}

  docker-release:
    name: Publish Docker images
    runs-on: ubuntu-latest
    needs: [ validation ]
    permissions:
      contents: write
      packages: write
    if: needs.validation.outputs.release_version

    strategy:
      fail-fast: false
      matrix:
        variant: [
          { dir: runtimes, img: bdrs-server },
          { dir: runtimes, img: bdrs-server-memory },
        ]

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true
      - uses: ./.github/actions/publish-docker-image
        name: Publish ${{ matrix.variant.img }}
        with:
          docker_tag: ${{ needs.validation.outputs.release_version }}
          rootDir: ${{ matrix.variant.dir }}
          imagename: ${{ matrix.variant.img }}
          docker_user: ${{ secrets.DOCKER_HUB_USER }}
          docker_token: ${{ secrets.DOCKER_HUB_TOKEN }}
          do_push: 'true'

  # Release: Helm Charts
  helm-release:
    name: Publish new helm release
    needs: [ validation ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    if: needs.validation.outputs.release_version
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.8.1
      - name: Package helm, update index.yaml and push to gh-pages
        env:
          RELEASE_VERSION: ${{ needs.validation.outputs.RELEASE_VERSION }}
        run: |
          # Prepare git env
          git config user.name "eclipse-tractusx-bot"
          git config user.email "tractusx-bot@eclipse.org"

          # Package all charts
          find charts -name Chart.yaml -not -path "./edc-tests/*" | xargs -n1 dirname | xargs -n1 helm package -u -d helm-charts

          git checkout gh-pages || git checkout -b gh-pages
          git pull --rebase origin gh-pages

          # Generate helm repo index.yaml
          helm repo index . --merge index.yaml --url https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/

          # Commit and push to gh-pages
          git add index.yaml helm-charts
          git commit -s -m "Release $RELEASE_VERSION"

          git push origin gh-pages

  # Release: GitHub tag & release; Merges back releases into main; Starts a new development cycle;
  github-release:
    name: Publish new github release
    needs: [ validation, maven-release, docker-release, helm-release ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: needs.validation.outputs.release_version
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # 0 to fetch the full history due to upcoming merge of releases into main branch
          fetch-depth: 0
          persist-credentials: true
      - name: Create Release Tag
        id: create_release_tag
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.validation.outputs.RELEASE_VERSION }}
        run: |
          # Prepare git env
          git config user.name "eclipse-tractusx-bot"
          git config user.email "tractusx-bot@eclipse.org"

          # informative
          git branch -a
          git tag

          # Create & push tag
          git tag "$RELEASE_VERSION"
          git push origin "$RELEASE_VERSION"
      - name: Create GitHub Release
        env:
          RELEASE_VERSION: ${{ needs.validation.outputs.RELEASE_VERSION }}
          PREVIOUS_TAG: ${{ inputs.previous_tag }}
          MAKE_LATEST: ${{ inputs.latest }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_FLAG=""
          if [[ "$MAKE_LATEST" == "true" ]]; then
            LATEST_FLAG="--latest"
          fi
          gh release create "$RELEASE_VERSION" \
            --generate-notes \
            --notes-start-tag "$PREVIOUS_TAG" \
            --verify-tag \
            $LATEST_FLAG

  publish-openapi-to-gh-pages:
    name: "Publish OpenAPI UI spec GitHub Pages"
    permissions:
      contents: write
      packages: write
      pages: write
    needs: [ validation ]
    uses: ./.github/workflows/publish-openapi.yaml

  main-branch-update:
    name: "Bump main branch version"
    runs-on: ubuntu-latest
    needs: [ validation, github-release ]
    if: ${{ needs.validation.outputs.update_main_branch_version == 'true' }}
    permissions:
      contents: write
      packages: write
      pages: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: true
      - name: Version and Chart Updates
        uses: ./.github/actions/update-version-and-charts
        with:
          version: ${{ needs.validation.outputs.release_version }}
          bump_version: "true"
      - name: Push main updates
        run: |
          git push origin main
