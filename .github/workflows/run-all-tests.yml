---
## This is a master test workflow that runs the verify.yaml workflow and the deployment-test.yaml workflow
name: Run-All-Tests

on:
  push:
    branches:
      - main
      - release/*
  pull_request:
    paths-ignore:
      - docs/**
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish docker image"
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      publish:
        description: "Publish docker image"
        required: false
        type: boolean
        default: false

concurrency:
  # cancel older running jobs on the same branch
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  verify:
    permissions:
      contents: write
    uses: ./.github/workflows/verify.yaml

  deployment-test:
    uses: ./.github/workflows/deployment-test.yaml

  upgradeability-test:
      uses: ./.github/workflows/upgradeability-test.yaml

  # this job really serves no other purpose than waiting for the other two test workflows
  # in future iterations, this could be used as a choke point to collect test data, etc.
  summary:
    needs:
      - verify
      - deployment-test
    runs-on: ubuntu-latest
    steps:
      - name: 'Master test job'
        run: echo "all test jobs have run by now"

  publish-docker:
    name: "Publish docker image"
    needs: [ summary ]
    permissions:
      contents: write
      packages: write
    if: ${{ (github.ref_name == 'main' || startsWith(github.ref_name, 'release/')) && (github.event_name == 'push' || inputs.publish == true) }}
    uses: ./.github/workflows/publish-docker.yaml

